        assigneeUserId:
          $ref: '#/components/schemas/UUID'
        labels:
          type: array
          items:
            type: string
    KanbanCardUpdateRequest:
      type: object
      properties:
        title:
          type:
          - string
          - 'null'
          maxLength: 500
        description:
          type:
          - string
          - 'null'
          maxLength: 5000
        sortOrder:
          $ref: '#/components/schemas/SortOrder'
        backlogItemId:
          $ref: '#/components/schemas/UUID'
        assigneeUserId:
          $ref: '#/components/schemas/UUID'
        labels:
          type:
          - array
          - 'null'
          items:
            type: string
    KanbanColumnReorderRequest:
      type: object
      required:
      - columnIds
      properties:
        columnIds:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UUID'
    KanbanCardReorderRequest:
      type: object
      required:
      - cardIds
      properties:
        cardIds:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UUID'
    KanbanCardMoveRequest:
      type: object
      required:
      - targetColumnId
      properties:
        targetColumnId:
          $ref: '#/components/schemas/UUID'
        sortOrder:
          $ref: '#/components/schemas/SortOrder'
paths:
  /state:
    get:
      operationId: listAppState
      summary: List / delta-sync app state keys
      description: 'Return current values for all state keys, or only keys changed
        since a timestamp. LAMP: offset/limit; Convex: paginated queries.'
      tags:
      - App State
      parameters:
      - name: since
        in: query
        schema:
          type: string
          format: date-time
        description: Only keys updated after this timestamp (delta-sync)
      - name: key_prefix
        in: query
        schema:
          type: string
        description: Filter by key namespace prefix, e.g. 'settings.theme'
      - $ref: '#/components/parameters/PaginationParams'
      responses:
        '200':
          description: State collection
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/AppState'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: batchFetchAppState
      summary: Batch fetch — return current values for listed keys
      description: 'Optimal for mobile sync-reconciliation: batch-fetch a list of
        keys and compare client vs server in one round-trip.'
      tags:
      - App State
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppStateBatchRequest'
      responses:
        '200':
          description: Current values for requested keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStateBatchResponse'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: batchUpsertAppState
      summary: Batch upsert — atomically write multiple keys
      description: 'Idempotent batch upsert. LAMP: atomic transaction. Convex: multi-mutation.
        Safe for mobile retry — duplicate PUTs are harmless.'
      tags:
      - App State
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppStateBatchRequest'
      responses:
        '200':
          description: Upserted state entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStateBatchResponse'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: batchDeleteAppState
      summary: Batch delete — atomically remove multiple keys
      description: All-or-nothing batch delete. Idempotent — absent keys are ignored.
      tags:
      - App State
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppStateBatchRequest'
      responses:
        '200':
          description: Deleted count
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /state/{key}:
    get:
      operationId: getAppStateByKey
      summary: Get a single state entry by key
      description: Supports If-None-Match / If-Modified-Since for HTTP caching. LAMP
        ETag = md5(value); Convex built-in optimistic concurrency.
      tags:
      - App State
      parameters:
      - $ref: '#/components/parameters/KeyParam'
      responses:
        '200':
          description: Current value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppState'
        '304':
          description: Not Modified — client ETag matches
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: upsertAppStateByKey
      summary: Idempotent upsert by key
      description: Idempotent upsert. Safe for mobile retry.
      tags:
      - App State
      parameters:
      - $ref: '#/components/parameters/KeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppStateUpsertRequest'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Upserted entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppState'
    patch:
      operationId: patchAppStateByKey
      summary: Partial update (shallow merge) by key
      description: PATCH merges value fields. Returns 404 if key missing — use PUT
        to create.
      tags:
      - App State
      parameters:
      - $ref: '#/components/parameters/KeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppStateUpsertRequest'
      responses:
        '200':
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppState'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteAppStateByKey
      summary: Delete by key (idempotent)
      description: Idempotent — returns 200 even if the key does not exist.
      tags:
      - App State
      parameters:
      - $ref: '#/components/parameters/KeyParam'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Deleted (or absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
  /todos:
    get:
      operationId: listTodos
      summary: List todos with filtering, pagination, and sorting
      description: 'Paginated list. LAMP: SQL builder with prepared statements; MySQL
        FULLTEXT on title+description for ?search=. Filters are AND-combined.'
      tags:
      - Todos
      parameters:
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/TodoStatus'
      - name: priority
        in: query
        schema:
          $ref: '#/components/schemas/TodoPriority'
      - name: assignedTo
        in: query
        schema:
          type: string
      - name: dueBefore
        in: query
        schema:
          type: string
          format: date-time
      - name: dueAfter
        in: query
        schema:
          type: string
          format: date-time
      - name: tag
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
        description: FULLTEXT search on title + description
      - name: parentId
        in: query
        schema:
          type: string
        description: null = top-level only; omit = all levels
      - $ref: '#/components/parameters/PaginationParams'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Paginated todo list
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/TodoItem'
    post:
      operationId: createTodo
      summary: Create a new todo item
      tags:
      - Todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreateRequest'
      responses:
        '201':
          description: Created todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /todos/{todo_id}:
    get:
      operationId: getTodo
      summary: Get a single todo by ID
      tags:
      - Todos
      parameters:
      - $ref: '#/components/parameters/TodoIdParam'
      responses:
        '200':
          description: Todo item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateTodo
      summary: Partial update of a todo
      description: 'PATCH is partial. Pass null to clear optional fields. e.g. PATCH
        body: {"dueDate": null}'
      tags:
      - Todos
      parameters:
      - $ref: '#/components/parameters/TodoIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdateRequest'
      responses:
        '200':
          description: Updated todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteTodo
      summary: Soft-delete a todo
      description: Soft-delete sets deletedAt. Children become orphans (parent_id=null)
        unless ?cascade=true. Deleted records excluded from list responses.
      tags:
      - Todos
      parameters:
      - $ref: '#/components/parameters/TodoIdParam'
      - name: cascade
        in: query
        schema:
          type: boolean
          default: false
        description: If true, cascades deletion to child todos
      responses:
        '200':
          description: Todo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: 'Conflict: cascade required but not requested'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /todos/{todo_id}/toggle:
    post:
      operationId: toggleTodoCompletion
      summary: Toggle todo completion status
      description: Switches between completed and pending. in_progress / cancelled
        -> completed; completed -> pending. Returns the updated todo.
      tags:
      - Todos
      parameters:
      - $ref: '#/components/parameters/TodoIdParam'
      responses:
        '200':
          description: Updated todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoItem'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /todos/batch:
    post:
      operationId: batchTodoOperations
      summary: Atomic batch CRUD operations on todos
      description: 'All-or-nothing batch. Sub-op types: create, update, delete, toggle.
        LAMP: multi-statement transaction. Convex: batched mutations.'
      tags:
      - Todos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - operations
              properties:
                operations:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    oneOf:
                    - type: object
                      required:
                      - op
                      properties:
                        op:
                          const: create
                        data:
                          $ref: '#/components/schemas/TodoCreateRequest'
                    - type: object
                      required:
                      - op
                      - id
                      properties:
                        op:
                          const: update
                        id:
                          $ref: '#/components/schemas/UUID'
                        data:
                          $ref: '#/components/schemas/TodoUpdateRequest'
                    - type: object
                      required:
                      - op
                      - id
                      properties:
                        op:
                          const: delete
                        id:
                          $ref: '#/components/schemas/UUID'
                    - type: object
                      required:
                      - op
                      - id
                      properties:
                        op:
                          const: toggle
                        id:
                          $ref: '#/components/schemas/UUID'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Per-operation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: array
                    items:
                      $ref: '#/components/schemas/TodoBatchResultSuccess'
                  failed:
                    type: array
                    items:
                      $ref: '#/components/schemas/TodoBatchResultFailure'
  /backlog:
    get:
      operationId: listBacklogItems
      summary: List backlog items with rich filtering and pagination
      description: 'Filters are AND-combined. LAMP: SQL with prepared statements.
        Convex: paginated query with compound index on (type, status, priority).'
      tags:
      - Backlog
      parameters:
      - name: type
        in: query
        schema:
          $ref: '#/components/schemas/BacklogItemType'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/BacklogItemStatus'
      - name: priority
        in: query
        schema:
          $ref: '#/components/schemas/BacklogPriority'
      - name: assignedTo
        in: query
        schema:
          type: string
      - name: tag
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
      - name: parentId
        in: query
        schema:
          type: string
      - name: hasParent
        in: query
        schema:
          type: boolean
      - $ref: '#/components/parameters/PaginationParams'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Paginated backlog list
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/BacklogItem'
    post:
      operationId: createBacklogItem
      summary: Create a new backlog item
      tags:
      - Backlog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacklogCreateRequest'
      responses:
        '201':
          description: Created backlog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItem'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /backlog/triage:
    post:
      operationId: submitTriageIdea
      summary: Submit a triage idea
      description: Lightweight triage submission. Server forces type=idea and status=triage
        regardless of client input. The `source` field records the origin channel
        for analytics, e.g. 'mobile-suggestion-box'.
      tags:
      - Backlog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - title
              properties:
                title:
                  type: string
                  maxLength: 500
                description:
                  type:
                  - string
                  - 'null'
                  maxLength: 5000
                source:
                  type: string
                  description: Origin channel, e.g. mobile-idea-box
      responses:
        '201':
          description: Created triage item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItem'
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /backlog/{id}:
    get:
      operationId: getBacklogItem
      summary: Get a backlog item by ID
      description: Supports ?expand=children for embedding immediate children and
        ?expand=ancestors for the full ancestor chain.
      tags:
      - Backlog
      parameters:
      - $ref: '#/components/parameters/BacklogIdParam'
      - $ref: '#/components/parameters/BacklogExpandParam'
      responses:
        '200':
          description: Backlog item (expanded if requested)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItemExpanded'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      operationId: updateBacklogItem
      summary: Partial update of a backlog item
      description: Use explicit null to clear fields. 409 returned for version conflict
        or cycle-detection failures.
      tags:
      - Backlog
      parameters:
      - $ref: '#/components/parameters/BacklogIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BacklogUpdateRequest'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItem'
        '409':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteBacklogItem
      summary: Delete a backlog item
      description: 'Rejects 409 HAS_CHILDREN unless ?cascade=true. Convex: Deduplicated
        subtree delete. LAMP: CTE recursive delete.'
      tags:
      - Backlog
      parameters:
      - $ref: '#/components/parameters/BacklogIdParam'
      - name: cascade
        in: query
        schema:
          type: boolean
          default: false
        description: If true, recursively delete children before deleting parent
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Has children — pass ?cascade=true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /backlog/{id}/children:
    get:
      operationId: listBacklogChildren
      summary: Get direct children of a backlog item
      description: 'Results sorted by sort_order. Convex index: filter parentId, order
        sort_order asc.'
      tags:
      - Backlog
      parameters:
      - $ref: '#/components/parameters/BacklogIdParam'
      - $ref: '#/components/parameters/PaginationParams'
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Child items
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PaginatedResponse'
                - type: object
                  properties:
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/BacklogItem'
    post:
      operationId: linkChildToParent
      summary: Link a child item to a parent backlog item
      description: 'Validates: no self-reference, no double-parenting, no cycle (full
        ancestor chain check). 409 on any validation failure.'
      tags:
      - Backlog
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Parent item ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - childId
              properties:
                childId:
                  type: string
                  format: uuid
                  description: UUID of the child item to link
      responses:
        '204':
          description: Child linked — no body
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: unlinkChild
      summary: Unlink a child item from its parent
      description: Sets child.parentId = null. Does NOT delete the child.
      tags:
      - Backlog
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Parent item ID
      - name: childId
        in: path
        required: true
        schema:
          type: string
        description: Child item ID to unlink
      responses:
        '200':
          description: Child unlinked
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /backlog/{id}/ancestors:
    get:
      operationId: listBacklogAncestors
      summary: Get the full ancestor chain of a backlog item
      description: 'Returns every ancestor from root to direct parent, ordered root
        -> parent. Convex: indexed ancestor traversal.'
      tags:
      - Backlog
      parameters:
      - $ref: '#/components/parameters/BacklogIdParam'
      responses:
        '200':
          description: Ancestor chain
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BacklogItemExpanded'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /backlog/batch:
    post:
      operationId: batchBacklogOperations
      summary: Batch backlog operations (bulk create / status / assign)
      description: 'All-or-nothing batch. Convex: batched mutations. LAMP: single
        multi-statement transaction with prepared statements.'
      tags:
      - Backlog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - op
              - items
              properties:
                op:
                  type: string
                  enum:
                  - bulk_create
                  - bulk_status_change
                  - bulk_assign
                items:
                  type: array
                  minItems: 1
                  items:
                    oneOf:
                    - type: object
                      required:
                      - type
                      - priority
                      - title
                      properties:
                        type:
                          $ref: '#/components/schemas/BacklogItemType'
                        priority:
                          $ref: '#/components/schemas/BacklogPriority'
                        title:
                          type: string
                    - type: object
                      required:
                      - id
                      - status
                      properties:
                        id:
                          type: string
                        status:
                          $ref: '#/components/schemas/BacklogItemStatus'
                    - type: object
                      required:
                      - id
                      - assignedToUserId
                      properties:
                        id:
                          type: string
                        assignedToUserId:
                          type: string
      responses:
        '400':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '200':
          description: Batch results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchBacklogResult'
