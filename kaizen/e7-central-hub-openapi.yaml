tags:
- name: App State
  description: Key-value state management with delta-sync, ETags, and batch operations.
    Supports both LAMP (REST) and Convex (real-time) backends.
- name: Todos
  description: Task management with filtering, pagination, soft-delete, toggle completion,
    and atomic batch operations.
- name: Backlog
  description: Feature/bug/task tracking with hierarchical parent-child linking, cycle
    detection, triage submission, and batch operations.
- name: Kanban
  description: Kanban board workflow with boards, columns, cards, drag-and-drop move,
    reorder, WIP limits, and dashboard statistics.
