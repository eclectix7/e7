openapi: 3.1.0
info:
  title: E7 Central Hub API
  version: 1.0.0-dev
  x-generated-by: hermes-kanban-worker t_4a5ba946
  description: "## E7 Central Hub - Unified API Specification\n\nThe E7 Central Hub\
    \ is a unified management platform with a **dual-view architecture**:\n\n| View\
    \ | Stack | Description |\n|------|-------|-------------|\n| **LAMP Web Dashboard**\
    \ | PHP / MySQL / Apache | Browser-based admin and management interface |\n| **Expo\
    \ Mobile App** | React Native / Convex | iOS & Android companion client |\n\n\
    This single OpenAPI 3.1 document covers every REST endpoint consumed by both views.\n\
    The backend is a **hybrid LAMP + Convex** stack: LAMP serves the web dashboard\
    \ and\nprovides traditional REST endpoints; Convex powers real-time subscriptions\
    \ for the\nExpo mobile client and acts as the API proxy.\n\n## API Groups\n\n\
    | Group | Prefix | Operations |\n|-------|--------|-----------|\n| App State |\
    \ `/state`, `/state/{key}` | 8 |\n| Todos | `/todos` | 7 |\n| Backlog | `/backlog`\
    \ | 11 |\n| Kanban Boards | `/boards` | 18 |\n| **Total** | | **44** |\n\n## Authentication\n\
    \nAll endpoints require one of:\n\n- **JWT Bearer token** — mobile (Expo) clients\
    \ obtain short-lived access tokens via\n  the Convex auth pipeline; refresh tokens\
    \ are rotated server-side.\n- **API Key** (`X-API-Key`) — LAMP dashboard and internal\
    \ integrations use long-lived\n  scoped API keys stored hashed in MySQL.\n\n##\
    \ Conventions\n\n- UUID v4 primary keys for all resources.\n- ISO 8601 UTC timestamps\
    \ everywhere.\n- Pagination via `offset` + `limit` query parameters (default limit=20).\n\
    - Soft-delete where noted; deleted records excluded from list responses.\n- PATCH\
    \ is always partial; use explicit `null` to clear an optional field.\n- `$ref`\
    \ resolution is intra-document; this spec is fully self-contained.\n"
  contact:
    name: E7 LLC
    url: https://e7-hub.com
    email: api@e7-hub.com
  license:
    name: Proprietary
    identifier: UNLICENSED
servers:
- url: https://api.e7-hub.com/v1
  description: Production - Convex backend proxy
- url: https://e7-hub.com/api/v1
  description: Production - LAMP REST layer
- url: http://localhost:3000/v1
  description: Convex local dev server
- url: http://localhost:8080/api/v1
  description: LAMP local dev (Apache/PHP)
security:
- BearerAuth: []
- ApiKeyAuth: []
components:
  parameters:
    PaginationParams:
      name: pagination
      in: query
      description: Pagination parameters (inline, not a resource $ref)
      style: deepObject
      explode: true
      schema:
        type: object
        properties:
          offset:
            type: integer
            minimum: 0
            default: 0
          limit:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
    ExpandParam:
      name: expand
      in: query
      description: Embed related data inline
      schema:
        type: string
        enum:
        - columns
        - cards
    BoardExpandParam:
      name: expand
      in: query
      description: Embed related data inline
      schema:
        type: string
        enum:
        - columns
        - cards
        - backlogItem
    BacklogExpandParam:
      name: expand
      in: query
      description: Embed related records inline
      schema:
        type: string
        enum:
        - children
        - ancestors
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Dot-separated key, e.g. 'settings.theme'
    TodoIdParam:
      name: todo_id
      in: path
      required: true
      schema:
        type: string
    BacklogIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: BacklogItem UUID
    BoardIdParam:
      name: boardId
      in: path
      required: true
      schema:
        type: string
      description: KanbanBoard UUID
    ColumnIdParam:
      name: columnId
      in: path
      required: true
      schema:
        type: string
      description: KanbanColumn UUID
    CardIdParam:
      name: cardId
      in: path
      required: true
      schema:
        type: string
      description: KanbanCard UUID
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access token issued by the Convex auth pipeline.

        Client sends: Authorization: Bearer ***

        Refresh tokens are rotated server-side.'
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 'Long-lived scoped API key for LAMP dashboard integrations.

        Keys are stored hashed in MySQL; the plain value is presented only once at
        issuance.'
  schemas:
    UUID:
      type: string
      pattern: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
      description: UUID v4 primary key
    Timestamp:
      type: string
      format: date-time
      description: ISO 8601 UTC, e.g. 2025-01-01T00:00:00.000Z
    SortOrder:
      type: number
      format: double
      minimum: 0
      description: Floating-point sort order; lower values appear first. Allows mid-list
        insertion without renumbering all siblings.
    PaginationParamsSchema:
      type: object
      properties:
        offset:
          type: integer
          minimum: 0
          default: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    PaginatedResponse:
      type: object
      required:
      - items
      - total
      properties:
        items:
          type: array
        total:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
      description: Standard paginated list envelope
    Error:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: object
    AppState:
      type: object
      required:
      - appId
      - key
      - value
      - version
      properties:
        appId:
          $ref: '#/components/schemas/UUID'
        key:
          type: string
          description: Dot-separated namespace key, e.g. 'settings.theme'
        value:
          type: object
          description: Arbitrary JSON-serialisable value
        version:
          type: integer
          minimum: 1
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        etag:
          type: string
          description: Opaque ETag value for HTTP caching
    AppStateUpsertRequest:
      type: object
      required:
      - key
      - value
      properties:
        key:
          type: string
        value:
          type: object
    AppStateBatchRequest:
      type: object
      required:
      - ops
      properties:
        ops:
          type: array
          minItems: 1
          maxItems: 200
          items:
            oneOf:
            - type: object
              required:
              - op
              - key
              - value
              properties:
                op:
                  const: upsert
                key:
                  type: string
                value:
                  type: object
            - type: object
              required:
              - op
              - key
              properties:
                op:
                  const: delete
                key:
                  type: string
    AppStateBatchResponse:
      type: object
      properties:
        succeeded:
          type: array
          items:
            $ref: '#/components/schemas/AppState'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/Error'
    AppStateCollectionFilter:
      type: object
      properties:
        appId:
          $ref: '#/components/schemas/UUID'
        key_prefix:
          type: string
        updated_since:
          type: string
          format: date-time
    AppStateSyncMeta:
      type: object
      properties:
        last_sync:
          type: string
          format: date-time
        since:
          type: string
          format: date-time
        client_version:
          type: integer
    TodoStatus:
      type: string
      enum:
      - pending
      - in_progress
      - completed
      - cancelled
      description: pending -> in_progress -> completed; cancelled is terminal. Toggle
        maps in_progress/cancelled <-> completed.
